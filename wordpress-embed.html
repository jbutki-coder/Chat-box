<!-- Simple iframe embed. Replace the src with your Render URL. -->
<iframe
  src="https://YOUR-RENDER-URL.onrender.com"
  width="100%"
  height="760"
  style="border:0; max-width:980px; display:block; margin:0 auto;"
  loading="lazy"
  title="Website Messenger">
</iframe>

<!-- Optional button + popup/lightbox style embed. Replace the src with your Render URL. -->
<style>
  .im-chat-launcher {
    border: 0;
    background: #123c7a;
    color: white;
    font: 700 16px Arial, sans-serif;
    padding: 14px 18px;
    cursor: pointer;
  }
  .im-chat-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999999;
    background: rgba(0,0,0,.72);
    padding: 18px;
  }
  .im-chat-overlay.is-open {
    display: grid;
    place-items: center;
  }
  .im-chat-modal {
    width: min(980px, 100%);
    height: min(820px, 94vh);
    background: white;
    position: relative;
  }
  .im-chat-close {
    position: absolute;
    right: 10px;
    top: 10px;
    z-index: 2;
    border: 0;
    background: #111;
    color: #fff;
    padding: 8px 10px;
    cursor: pointer;
  }
  .im-chat-modal iframe {
    width: 100%;
    height: 100%;
    border: 0;
  }
</style>

<button class="im-chat-launcher" type="button" onclick="document.querySelector('.im-chat-overlay').classList.add('is-open')">
  Message Us
</button>

<div class="im-chat-overlay" onclick="if(event.target === this) this.classList.remove('is-open')">
  <div class="im-chat-modal">
    <button class="im-chat-close" type="button" onclick="document.querySelector('.im-chat-overlay').classList.remove('is-open')">Close</button>
    <iframe src="https://YOUR-RENDER-URL.onrender.com" title="Website Messenger"></iframe>
  </div>
</div>
